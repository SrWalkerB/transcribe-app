name: Build whisper-cli (Vulkan)

# Compila o whisper.cpp com backend Vulkan para Windows x64 e publica o binário
# (whisper-cli.exe + DLLs) numa release de tag fixa `whisper-vulkan`. O app baixa
# esse zip sob demanda (ver install_whisper_cli em src-tauri/src/lib.rs).
#
# Execute manualmente em Actions -> "Build whisper-cli (Vulkan)" -> Run workflow.
# Rode uma vez para desbloquear o download no app; rode de novo só para atualizar
# a versão do whisper.cpp.

on:
  workflow_dispatch:
    inputs:
      whisper_ref:
        description: "Tag/branch do whisper.cpp (ggml-org/whisper.cpp)"
        required: true
        default: "v1.8.6"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          ref: ${{ github.event.inputs.whisper_ref }}

      - name: Install Vulkan SDK
        # Pinado ao SHA (supply-chain). Renovate/Dependabot mantém atualizado.
        uses: jakoch/install-vulkan-sdk-action@b394a1abed9cb019d8e637eeadac93d73e0853da # v1.5.5
        with:
          vulkan_version: 1.3.290.0
          install_runtime: true
          cache: true
          stripdown: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure (CMake, Vulkan)
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DGGML_VULKAN=ON
          -DWHISPER_BUILD_EXAMPLES=ON
          -DWHISPER_BUILD_TESTS=OFF
          -DWHISPER_BUILD_SERVER=OFF
          -DBUILD_SHARED_LIBS=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Stage binaries (whisper-cli.exe + DLLs)
        shell: pwsh
        run: |
          $bin = "build/bin/Release"
          if (-not (Test-Path "$bin/whisper-cli.exe")) {
            # Alguns geradores colocam direto em build/bin
            $bin = "build/bin"
          }
          if (-not (Test-Path "$bin/whisper-cli.exe")) {
            throw "whisper-cli.exe não encontrado em build/bin[/Release]"
          }
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Get-ChildItem -Path $bin -File |
            Where-Object { $_.Extension -in '.exe', '.dll' } |
            ForEach-Object { Copy-Item $_.FullName -Destination staging -Force }
          Write-Host "Conteúdo empacotado:"
          Get-ChildItem staging | Format-Table Name, Length

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path staging/* -DestinationPath whisper-cli-vulkan-win-x64.zip -Force

      - name: Publish to fixed release tag
        # Pinado ao SHA (supply-chain). Renovate/Dependabot mantém atualizado.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: whisper-vulkan
          name: "whisper-cli (Vulkan) — Windows x64"
          body: |
            Binário do whisper.cpp compilado com backend Vulkan (`-DGGML_VULKAN=ON`)
            a partir de `ggml-org/whisper.cpp@${{ github.event.inputs.whisper_ref }}`.

            Usado pelo Transcribe App para aceleração por GPU (AMD/Vulkan) no Windows.
            Requer apenas o driver de GPU com suporte a Vulkan (vulkan-1.dll vem do sistema).
          files: whisper-cli-vulkan-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
